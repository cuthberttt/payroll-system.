{% extends "base.html" %}

{% block title %}Page Not Found{% endblock %}

{% block content %}
<div class="text-center mt-5">
    <h1 style="color: #003366; font-size: 72px;">404</h1>
    <h2>Page Not Found</h2>
    <p class="text-muted">The page you're looking for doesn't exist.</p>
    <a href="{{ url_for('index') }}" class="btn" style="background-color: #003366; color: white;">
        Go Back Home
    </a>
</div>
{% endblock %}
